<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cộng 2 Số Lớn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .result-box {
            font-size: 2rem; font-weight: bold;
            color: #0d6efd; letter-spacing: 2px;
        }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="container py-5">

    <div class="text-center mb-4">
        <h1 class="display-5 fw-bold text-primary">🔢 Cộng 2 Số Lớn</h1>
        <p class="text-muted">Hiển thị tiến trình từng bước như học sinh Tiểu học</p>
    </div>

    <!-- FORM -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Nhập 2 số cần cộng</h5>
        </div>
        <div class="card-body">
            <div th:if="${error}"
                 class="alert alert-danger"
                 th:text="${error}"></div>
            <form method="post" action="/calculate">
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label fw-semibold">Số thứ nhất</label>
                        <input type="text" name="stn1"
                               class="form-control form-control-lg
                                      text-end font-monospace"
                               placeholder="Ví dụ: 1234"
                               th:value="${stn1}">
                    </div>
                    <div class="col-md-1 text-center">
                        <span class="fs-2 text-secondary fw-bold">+</span>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-semibold">Số thứ hai</label>
                        <input type="text" name="stn2"
                               class="form-control form-control-lg
                                      text-end font-monospace"
                               placeholder="Ví dụ: 897"
                               th:value="${stn2}">
                    </div>
                    <div class="col-md-1">
                        <button type="submit"
                                class="btn btn-primary btn-lg w-100">=</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- KẾT QUẢ -->
    <div th:if="${hasResult}" class="fade-in">

        <div class="card shadow-sm mb-4 border-primary">
            <div class="card-body text-center py-4">
                <p class="text-muted mb-1">Kết quả</p>
                <div class="font-monospace result-box"
                     th:text="${stn1} + ' + ' + ${stn2} + ' = ' + ${result}">
                </div>
            </div>
        </div>

        <!-- BẢNG TIẾN TRÌNH -->
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white
                        d-flex justify-content-between align-items-center">
                <h5 class="mb-0">📋 Tiến trình thực hiện</h5>
                <span class="badge bg-light text-dark"
                      th:text="${steps.size()} + ' bước'"></span>
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered table-hover mb-0">
                    <thead class="table-light text-center">
                    <tr>
                        <th>Bước</th>
                        <th>Digit 1</th>
                        <th>Digit 2</th>
                        <th>Nhớ vào</th>
                        <th>Tổng</th>
                        <th>Lưu</th>
                        <th>Nhớ ra</th>
                        <th>Kết quả tạm</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="step : ${steps}"
                        th:class="${step.carryOut > 0} ? 'table-warning' : ''"
                        class="text-center">
                        <td class="fw-bold text-primary"
                            th:text="${step.stepNumber}"></td>
                        <td class="font-monospace"
                            th:text="${step.digit1}"></td>
                        <td class="font-monospace"
                            th:text="${step.digit2}"></td>
                        <td>
                                <span th:if="${step.carryIn > 0}"
                                      class="badge bg-warning text-dark"
                                      th:text="${step.carryIn}"></span>
                            <span th:if="${step.carryIn == 0}"
                                  class="text-muted">0</span>
                        </td>
                        <td class="fw-semibold"
                            th:text="${step.total}"></td>
                        <td>
                                <span class="badge bg-success fs-6"
                                      th:text="${step.saved}"></span>
                        </td>
                        <td>
                                <span th:if="${step.carryOut > 0}"
                                      class="badge bg-warning text-dark"
                                      th:text="${step.carryOut}"></span>
                            <span th:if="${step.carryOut == 0}"
                                  class="text-muted">0</span>
                        </td>
                        <td class="font-monospace fw-bold text-end"
                            th:text="${step.currentResult}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer text-muted small">
                <span class="badge bg-warning text-dark">Vàng</span> = có số nhớ &nbsp;|&nbsp;
                <span class="badge bg-success">Xanh</span> = chữ số lưu vào kết quả
            </div>
        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
